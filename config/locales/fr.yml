  static_pages:
    about:
      a_html: |
        La coupe Kasahara est un tournoi international de kendo organisé chaque année depuis 1984 en l'honneur de <strong>Kasahara Toshiaki sensei</strong>, le premier Secrétaire de la ZNKR (Zen Nippon Kendo Renmei) et de l'IKF (International Kendo Federation). Kasahara sensei a joué un rôle crucial dans le dévelopement du kendo en Suisse.
        <br/>En 1972, son fils, Kasahara Hiroaki sensei, alors âgé de 22 ans et 4ème Dan de kendo, passa deux ans en Suisse comme professeur de kendo envoyé directement par la ZNKR.
      b_html: Le tournoi, organisé depuis plus de 20 ans à Genève par le section kendo du <a href='http://www.kendo-geneve.ch'>Shung Do Kwan Budo</a>, réunit environ 150 participants de toute l'Europe. En 2019, la 33ème édition a rassemblé des kenshis français, italiens, japonais, anglais et bien entendu suisses. Après deux ans de Hiatus pour cause de COVID, la 34ème édition de la Coupe Kasahara aura lieu cette année les 24 et 25 septembre au stade du Bout-du-Monde, proche du centre ville.
      title: La compétition
